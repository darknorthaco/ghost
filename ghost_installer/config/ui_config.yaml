# RedBlue UI Configuration
# Generated by GHOST Installer

ui:
  enabled: false
  host: 0.0.0.0
  port: 3000
  title: GHOST Distributed Compute Fabric

# Backend Integration
backend:
  controller_url: http://localhost:8765
  api_version: v1
  timeout: 30

# Socket Integration
socket:
  enabled: false
  url: ws://localhost:8081
  reconnect: true
  reconnect_interval: 5

# UI Features
features:
  dashboard: true
  worker_management: true
  task_monitoring: true
  logs: true
  settings: true

# Theme
theme:
  mode: dark  # light, dark, auto
  primary_color: "#3b82f6"
  secondary_color: "#8b5cf6"
