# GHOST spectral UI (Tk wizard)
# Generated by GHOST Installer

ui:
  enabled: false
  host: 0.0.0.0
  port: 3000
  title: GHOST — Sovereign Distributed Compute

# Backend Integration
backend:
  controller_url: http://localhost:8765
  api_version: v1
  timeout: 30

# Socket Integration
socket:
  enabled: false
  url: ws://localhost:8081
  reconnect: true
  reconnect_interval: 5

# UI Features
features:
  dashboard: true
  worker_management: true
  task_monitoring: true
  logs: true
  settings: true

# Theme
theme:
  mode: dark  # light, dark, auto
  primary_color: "#E6E6E6"
  secondary_color: "#1A1A1A"
  background_color: "#0F0F0F"
  text_color: "#E6E6E6"
