# GHOST Core Configuration
# Generated by GHOST Installer

controller:
  host: localhost
  port: 8765
  api_version: v1
  max_workers: 10

security:
  level: disabled  # disabled, development, production
  authentication: none  # none, api_key, jwt, certificate
  api_key: null
  rate_limiting: false
  ip_filtering: false

socket:
  enabled: false
  host: 0.0.0.0
  port: 8081
  ssl_enabled: false
  ssl_cert: null
  ssl_key: null

ui:
  enabled: false
  host: 0.0.0.0
  port: 3000
  controller_url: http://localhost:8765
  socket_integration: false

logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR
  file: logs/ghost.log
  max_size_mb: 100
  backup_count: 5

data:
  storage_dir: data/
  cache_dir: cache/
  temp_dir: temp/

performance:
  task_timeout: 300  # seconds
  heartbeat_interval: 30  # seconds
  max_retries: 3
